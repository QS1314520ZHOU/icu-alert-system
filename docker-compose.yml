version: '3.8'

services:
  api:
    build: ./backend
    container_name: icu_alert_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - icu_net

  redis:
    image: redis:7-alpine
    container_name: icu_alert_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - icu_net

volumes:
  redis_data:

networks:
  icu_net:
    driver: bridge
