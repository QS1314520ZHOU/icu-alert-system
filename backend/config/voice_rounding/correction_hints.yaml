# ============================================================
# 语音查房纠错提示配置
# 渝普口音（西南官话）+ ICU 术语
#
# 三类纠错策略：
#   accent_errors  — 口音导致的系统性错字，允许 LLM 自动纠正
#   dialect_phrases — 方言/口语→规范术语映射，允许 LLM 自动纠正
#   drug_confusables — 易混药名，禁止自动纠正，只标红提醒人工核对
#
# ⚠️ 类型 C 的药名绝不能让 LLM 自动改，只能标红提示医生确认。
# ============================================================

# 类型 A：渝普口音音系导致的系统性错字
# 机理：西南官话对普通话最稳定的几个音系差异，产生可预测的错字
# 这是最值得做规则纠错的部分，因为它有规律
accent_errors:
  # 平翘舌不分 (z/c/s ↔ zh/ch/sh)
  # "出"→"租"、"四"↔"十"混、"上"→"丧"
  # ⚠️ "十毫克"↔"四毫克"差 2.5 倍——数值保护线要拦
  - { wrong: ["丧机", "桑机"], right: "上机" }
  - { wrong: ["四毫克"], right: "十毫克", note: "数值高危：sh→s，差2.5倍" }
  - { wrong: ["擦管"], right: "插管" }
  - { wrong: ["真静", "振静"], right: "镇静" }
  - { wrong: ["租血", "租来"], right: "出血" }
  - { wrong: ["三管", "丧管"], right: "上管" }
  - { wrong: ["四次", "试次"], right: "十次" }
  - { wrong: ["菜集", "才集"], right: "采集" }
  - { wrong: ["酸钠"], right: "栓塞" }
  - { wrong: ["扫数"], right: "少数" }
  - { wrong: ["次激"], right: "刺激" }

  # n/l 不分
  # "脑"→"老"、"尿"→"料"/"鸟"
  - { wrong: ["料量", "鸟量"], right: "尿量" }
  - { wrong: ["老出血"], right: "脑出血" }
  - { wrong: ["老内压", "老压"], right: "颅内压" }
  - { wrong: ["料管"], right: "尿管" }
  - { wrong: ["料毒症"], right: "尿毒症" }
  - { wrong: ["料路感染"], right: "尿路感染" }
  - { wrong: ["泪霉素"], right: "奈替米星" }
  - { wrong: ["老利肽"], right: "脑利肽" }
  - { wrong: ["留置"], right: "留置" }  # n/l 不分时"留"可能变"牛"
  - { wrong: ["流质"], right: "流质" }

  # 前后鼻音不分 (in/ing、en/eng)
  # "病情"→"病亲"/"病轻"、"心"→"星"
  - { wrong: ["星率", "辛率"], right: "心率" }
  - { wrong: ["病亲", "病轻"], right: "病情" }
  - { wrong: ["心yalty"], right: "心律" }
  - { wrong: ["金脏"], right: "肾脏" }
  - { wrong: ["进脏"], right: "肾脏" }
  - { wrong: ["贫"], right: "频" }
  - { wrong: ["因"], right: "应" }
  - { wrong: ["新电图"], right: "心电图" }
  - { wrong: ["新衰"], right: "心衰" }
  - { wrong: ["新肌"], right: "心肌" }
  - { wrong: ["陈"], right: "成" }
  - { wrong: ["生"], right: "身" }

  # f/h 不分（部分老派渝普）
  # "肺"→"会"/"灰"、"发热"→"花热"/"哈热"
  - { wrong: ["会部", "灰部"], right: "肺部" }
  - { wrong: ["花热", "哈热"], right: "发热" }
  - { wrong: ["会炎"], right: "肺炎" }
  - { wrong: ["会功能"], right: "肺功能" }
  - { wrong: ["呼衰"], right: "呼衰" }  # h→f 反向
  - { wrong: ["花烧"], right: "发烧" }

  # 其他高频 ICU 口音错字
  - { wrong: ["气管切丧"], right: "气管切开" }
  - { wrong: ["切丧"], right: "切开" }
  - { wrong: ["引留管"], right: "引流管" }
  - { wrong: ["引留"], right: "引流" }
  - { wrong: ["胃管"], right: "胃管" }  # 保留，不易错
  - { wrong: ["氧和"], right: "氧合" }
  - { wrong: ["养和"], right: "氧合" }
  - { wrong: ["血压"], right: "血压" }  # 保留，不易错
  - { wrong: ["甘露春"], right: "甘露醇" }
  - { wrong: ["白蛋百"], right: "白蛋白" }
  - { wrong: ["肌肝"], right: "肌酐" }
  - { wrong: ["血长"], right: "血常规" }
  - { wrong: ["电解子"], right: "电解质" }
  - { wrong: ["凝血"], right: "凝血" }  # 保留

# 类型 B：方言/口语化表达 → 规范医学表达
# 医生用方言或大白话说，映射回规范术语
dialect_phrases:
  # 消化系统
  - { wrong: ["拉稀", "屙稀", "拉肚子"], right: "腹泻" }
  - { wrong: ["肚子胀", "胀气"], right: "腹胀" }
  - { wrong: ["吐了", "反胃"], right: "呕吐" }
  - { wrong: ["不想吃", "吃不下"], right: "纳差" }
  - { wrong: ["胃出血"], right: "消化道出血" }

  # 呼吸系统
  - { wrong: ["喘得凶", "出气费力", "气紧"], right: "呼吸困难" }
  - { wrong: ["痰多", "痰咳不出来"], right: "痰液增多" }
  - { wrong: ["排痰困难", "咳不出痰"], right: "排痰困难" }
  - { wrong: ["上呼吸机", "上了机"], right: "机械通气" }
  - { wrong: ["拔管了", "管子扯了"], right: "拔管" }

  # 循环系统
  - { wrong: ["血压垮了", "血压掉了"], right: "血压下降" }
  - { wrong: ["心跳得慌", "心慌"], right: "心悸" }
  - { wrong: ["心跳快"], right: "心率增快" }
  - { wrong: ["心跳慢"], right: "心率减慢" }
  - { wrong: ["血压飙了", "血压高了"], right: "血压升高" }

  # 体温
  - { wrong: ["烧得凶", "烧高了", "发烧了"], right: "高热" }
  - { wrong: ["退烧了", "烧退了"], right: "体温下降" }
  - { wrong: ["体温低", "发冷"], right: "低体温" }

  # 神经系统
  - { wrong: ["迷糊", "昏过去", "不清醒了"], right: "意识障碍" }
  - { wrong: ["喊不应", "叫不醒"], right: "意识模糊" }
  - { wrong: ["烦躁", "躁动"], right: "躁动" }
  - { wrong: ["说胡话"], right: "谵妄" }

  # 肾脏/液体
  - { wrong: ["尿少了", "没好多尿"], right: "尿量减少" }
  - { wrong: ["没尿了", "无尿"], right: "无尿" }
  - { wrong: ["肿了", "浮肿"], right: "水肿" }
  - { wrong: ["水多了", "液体多"], right: "液体潴留" }

  # 营养/代谢
  - { wrong: ["没得力气", "浑身软"], right: "乏力" }
  - { wrong: ["血糖高了"], right: "高血糖" }
  - { wrong: ["血糖低了"], right: "低血糖" }

  # 感染
  - { wrong: ["感染重了", "炎症高了"], right: "感染加重" }
  - { wrong: ["白细胞高"], right: "白细胞升高" }
  - { wrong: ["降钙素高"], right: "PCT升高" }

  # 护理/操作
  - { wrong: ["翻身", "翻个身"], right: "体位变换" }
  - { wrong: ["吸痰", "抽痰"], right: "气道吸引" }
  - { wrong: ["打针", "输液"], right: "静脉输液" }
  - { wrong: ["换药"], right: "伤口换药" }

# 类型 C：易混药名（口音放大混淆风险）
# ⚠️ 禁止 LLM 自动纠正！只标红提醒人工核对。
# 与数值/剂量同等保护级别。
drug_confusables:
  # 血管活性药
  - names: ["去甲肾上腺素", "肾上腺素"]
    note: '「去甲」两字常被吞，口音下尤甚。看泵速单位 μg/kg/min 区分'
  - names: ["多巴胺", "多巴酚丁胺"]
    note: "前者升压，后者强心。看用药目的和泵速"
  - names: ["去氧肾上腺素", "去甲肾上腺素"]
    note: "都是升压药，看具体泵速和适应证"
  - names: ["血管加压素", "去氨加压素"]
    note: "前者用于休克，后者用于尿崩/止血"

  # 抗感染
  - names: ["万古霉素", "替考拉宁"]
    note: "都是抗G+球菌，看TDM记录和给药频次"
  - names: ["头孢他啶", "头孢哌酮"]
    note: "都是三代头孢，看完整商品名/给药频次"
  - names: ["头孢哌酮舒巴坦", "头孢哌酮"]
    note: "前者含β-内酰胺酶抑制剂"
  - names: ["美罗培南", "亚胺培南"]
    note: "都是碳青霉烯，看肾功能和给药频次"
  - names: ["阿米卡星", "庆大霉素"]
    note: "都是氨基糖苷类，看TDM谷浓度"
  - names: ["利奈唑胺", "替考拉宁"]
    note: "都抗G+，前者可口服，看给药途径"

  # 镇静镇痛
  - names: ["咪达唑仑", "劳拉西泮"]
    note: "都是苯二氮卓类，看镇静方案和RASS目标"
  - names: ["丙泊酚", "右美托咪定"]
    note: "看镇静方案，前者深度镇静，后者浅镇静"
  - names: ["芬太尼", "舒芬太尼"]
    note: "效价差约10倍，看泵速单位"
  - names: ["瑞芬太尼", "芬太尼"]
    note: "前者超短效，看停药时机"
  - names: ["吗啡", "芬太尼"]
    note: "效价差约100倍，看剂量单位"

  # 其他高危
  - names: ["胰岛素", "甘精胰岛素"]
    note: "前者短效，后者长效，看给药时间和频次"
  - names: ["肝素", "低分子肝素"]
    note: "看给药途径和抗Xa监测"
  - names: ["氯化钾", "氯化钙"]
    note: "一字之差，用途完全不同，看电解质结果"
  - names: ["碳酸氢钠", "氯化钠"]
    note: "看用途：纠酸 vs 补液"
  - names: ["呋塞米", "托拉塞米"]
    note: "都是袢利尿剂，效价不同，看剂量"
