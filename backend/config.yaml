    parenteral_keywords: ["肠外营养", "TPN", "全肠外", "静脉营养", "脂肪乳", "复方氨基酸", "葡萄糖注射液"]
    grv_keywords: ["胃残余", "胃潴留", "GRV", "gastric residual"]
    vomit_keywords: ["呕吐", "返流", "反流", "vomit", "emesis", "regurgitation"]
    abdominal_distension_keywords: ["腹胀", "腹部膨隆", "abdominal distension", "bloating"]
    feeding_interrupt_keywords: ["中断喂养", "暂停喂养", "停止喂养", "禁食", "NPO", "hold feeding", "feeding interrupted"]
    albumin_keywords: ["白蛋白", "albumin", "ALB"]
    phosphate_keywords: ["磷", "无机磷", "血磷", "phosphate", "phos", "phosphorus"]
    magnesium_keywords: ["镁", "血镁", "magnesium"]

  drug_safety:
    opioid_med_warning_mg_per_day: 200
    opioid_min_long_term_days: 3
    opioid_stop_gap_hours: 24
    opioid_withdrawal_window_hours: 72
    opioid_course_gap_hours: 36
    opioid_resp_rr_threshold: 10
    opioid_resp_rr_critical: 8
    opioid_spo2_low_threshold: 92
    opioid_spo2_critical_threshold: 90
    opioid_spo2_drop_threshold: 4
    opioid_spo2_drop_window_hours: 2
    opioid_med_factors:
      morphine: 1.0
      fentanyl: 100.0
      sufentanil: 1000.0
      remifentanil: 200.0
      oxycodone: 1.5
      hydromorphone: 5.0
      pethidine: 0.1
      meperidine: 0.1
      tramadol: 0.1
      codeine: 0.15
      butorphanol: 7.0

  drug_mapping:
    vasopressors: ["去甲肾上腺素", "肾上腺素", "多巴胺", "去氧肾上腺素", "血管加压素"]
    heparin: ["肝素"]
    vancomycin: ["万古霉素"]
    sedatives: ["咪达唑仑", "丙泊酚", "右美托咪定", "地西泮", "芬太尼", "瑞芬太尼"]
    opioids: ["吗啡", "芬太尼", "舒芬太尼", "瑞芬太尼", "羟考酮", "氢吗啡酮", "哌替啶", "曲马多", "可待因", "布托啡诺", "morphine", "fentanyl", "sufentanil", "remifentanil", "oxycodone", "hydromorphone", "tramadol", "codeine", "opioid"]
    qt_risk: ["胺碘酮", "左氧氟沙星", "环丙沙星", "红霉素", "阿奇霉素", "氟哌啶醇", "奥氮平", "喹硫平"]

# ==================== 护理提醒 ====================
nurse_reminders:
  gcs:       { code: "param_score_gcs_obs",   interval_hours: 4 }
  rass:      { code: "param_score_rass_obs",   interval_hours: 4 }
  pain:      { code: "param_tengTong_score",   interval_hours: 4 }
  cpot:
    code: "param_score_cpot"
    interval_hours: 4
    name: "CPOT评估超时"
    analgesic_adjustment_enabled: true
    adjustment_lookback_hours: 8
    assessment_before_hours: 1
    assessment_after_hours: 1
    dose_change_ratio_threshold: 0.25
    adjustment_name: "CPOT评估(镇痛药调整前后)"
  bps:
    code: "param_score_bps"
    interval_hours: 4
    name: "BPS评估超时"
    analgesic_adjustment_enabled: true
    adjustment_lookback_hours: 8
    assessment_before_hours: 1
    assessment_after_hours: 1
    dose_change_ratio_threshold: 0.25
    adjustment_name: "BPS评估(镇痛药调整前后)"
  delirium:  { code: "param_delirium_score",   interval_hours: 12 }
  braden:    { code: "param_score_braden",     interval_hours: 24, name: "BRADEN压疮风险评估超时" }
  cam_icu:   { code: "param_delirium_score", rass_gte: -3, interval_hours: 8 }
  turning:
    code: "nurse_turning"
    interval_hours: 2
    very_high_risk_interval_hours: 1.5
    braden_high_risk_threshold: 12
    deep_sedation_rass_threshold: -2
    bmi_low_threshold: 18.5
    bmi_high_threshold: 30
