# ============================================================
# ICU智能预警系统 - 主配置文件
# ============================================================

system:
  name: "ICU智能预警系统"
  version: "1.0.0"
  timezone: "Asia/Shanghai"
  log_level: "INFO"
  log_dir: "./logs"

# ==================== 数据库配置 ====================
databases:
  smartcare:
    database: "SmartCare"
    # 已有Collection
    collections:
      patient: "patient"
      bedside: "bedside"
      device_cap: "deviceCap"
      device_online: "deviceOnline"
      device_bind: "deviceBind"
      drug_exe: "drugExe"
      config_param: "configParam"
      config_drug: "configDrug"
    # 预警系统新建Collection
    alert_collections:
      alert_records: "alert_records"
      alert_rules: "alert_rules"
      field_mapping: "field_mapping"
      score_records: "score_records"
      nurse_reminders: "nurse_reminders"
      audit_log: "audit_log"

  datacenter:
    database: "DataCenter"
    collections:
      exam: "VI_ICU_EXAM"
      exam_item: "VI_ICU_EXAM_ITEM"
      report: "VI_ICU_report"

# ==================== 数据关联 ====================
data_linking:
  # SmartCare库内关联: patient._id ←→ bedside.pid / drugExe.pid / deviceBind.pid
  # 跨库关联: patient.hisPid ←→ VI_ICU_EXAM.hisPid / VI_ICU_EXAM_ITEM.hisPid
  # 设备关联: deviceCap.deviceID → deviceBind.deviceID(unBindTime=null) → deviceBind.pid → patient._id
  cross_db_patient_key:
    smartcare: "_id"
    datacenter: "hisPid"
  device_to_patient:
    method: "device_bind"
    bind_collection: "deviceBind"
    active_condition: "unBindTime == null"

# ==================== 监护仪参数映射 ====================
vital_signs:
  temperature:    { code: "param_T",         name: "体温",      unit: "℃" }
  heart_rate:     { code: "param_HR",        name: "心率",      unit: "bpm" }
  resp_rate:      { code: "param_resp",      name: "呼吸频率",  unit: "次/分" }
  spo2:           { code: "param_spo2",      name: "血氧饱和度", unit: "%" }
  pulse_rate:     { code: "param_PR",        name: "脉率",      unit: "bpm" }
  rhythm:         { code: "param_xinLvLv",   name: "心律",      unit: "" }
  cvp:            { code: "param_cvp",       name: "中心静脉压", unit: "cmH2O" }
  etco2:          { code: "param_ETCO2",     name: "呼气末CO2", unit: "mmHg" }
  # 血压 - 有创（优先）
  ibp_systolic:   { code: "param_ibp_s",     name: "有创收缩压", unit: "mmHg" }
  ibp_diastolic:  { code: "param_ibp_d",     name: "有创舒张压", unit: "mmHg" }
  ibp_mean:       { code: "param_ibp_m",     name: "有创平均压", unit: "mmHg" }
  # 血压 - 无创
  nibp_systolic:  { code: "param_nibp_s",    name: "无创收缩压", unit: "mmHg" }
  nibp_diastolic: { code: "param_nibp_d",    name: "无创舒张压", unit: "mmHg" }
  nibp_mean:      { code: "param_nibp_m",    name: "无创平均压", unit: "mmHg" }

  # 取值优先级: 有创 > 无创
  map_priority: ["param_ibp_m", "param_nibp_m"]
  sbp_priority: ["param_ibp_s", "param_nibp_s"]
  dbp_priority: ["param_ibp_d", "param_nibp_d"]

# ==================== 呼吸机参数映射 ====================
ventilator:
  # 设置参数
  vent_mode:      { code: "param_HuXiMoShi",           name: "呼吸模式" }
  fio2:           { code: "param_FiO2",                 name: "FiO2",           unit: "%" }
  vt_set:         { code: "param_vent_set_vt",          name: "设置潮气量",     unit: "ml" }
  peep_set:       { code: "param_vent_peep",            name: "PEEP(设置)",     unit: "cmH2O" }
  ps_set:         { code: "param_vent_ps",              name: "PS(设置)",       unit: "cmH2O" }
  ipap:           { code: "param_vent_pc",              name: "IPAP",           unit: "cmH2O" }
  rr_set:         { code: "param_HuXiPinLv",            name: "设置频率",       unit: "次/分" }
  # 实测参数
  minute_vent:    { code: "param_vent_VE",              name: "分钟通气量",     unit: "L/min" }
  rr_measured:    { code: "param_vent_resp",             name: "实测呼吸率",     unit: "次/分" }
  vte:            { code: "param_vent_vt",               name: "呼出潮气量",     unit: "ml" }
  peep_measured:  { code: "param_vent_measure_peep",     name: "PEEP(实测)",     unit: "cmH2O" }
  pip:            { code: "param_vent_pip",              name: "气道峰压",       unit: "cmH2O" }
  pplat:          { code: "param_vent_plat_pressure",    name: "平台压",         unit: "cmH2O" }
  pmean:          { code: "param_vent_measure_Pmean",    name: "平均气道压",     unit: "cmH2O" }
  compliance:     { code: "param_vent_compliance",       name: "呼吸顺应性",     unit: "ml/cmH2O" }
  c_stat:         { code: "param_vent_C_STAT",           name: "静态顺应性",     unit: "ml/cmH2O" }

# ==================== 评分参数映射 ====================
assessments:
  gcs:            { code: "param_score_gcs_obs",    name: "GCS评分",     range: [3, 15] }
  rass:           { code: "param_score_rass_obs",   name: "RASS评分",    range: [-5, 4] }
  pain:           { code: "param_tengTong_score",   name: "疼痛评分",    range: [0, 10] }
  cpot:           { code: "param_score_cpot",       name: "CPOT评分",    range: [0, 8] }
  bps:            { code: "param_score_bps",        name: "BPS评分",     range: [3, 12] }
  delirium:       { code: "param_delirium_score",   name: "谵妄评分" }
  consciousness:  { code: "param_Yishi",            name: "意识" }
  braden:         { code: "param_score_braden",     name: "Braden评分",  range: [0, 23] }
  pupil_left:     { code: "param_左瞳孔/光反射",    name: "左瞳孔" }
  pupil_right:    { code: "param_右瞳孔/光反射",    name: "右瞳孔" }

# ==================== AI配置 ====================
ai_service:
  max_patients: 30
  suppression_seconds: 3600
  llm:
    timeout: 60
    max_concurrency: 4
    cache_ttl_seconds: 1800
    temperature: 0.1
    max_tokens: 4096

  task_routing:
    lab_item_mapping:
      temperature: 0.0
    rule_generation:
      temperature: 0.2

  lab_mapping:
    auto_init_on_startup: false
    confidence_threshold: 0.8
    batch_size: 50

  rag:
    enabled: true
    provider: "local"
    knowledge_dir: "knowledge_base"
    top_k: 4

  monitor:
    enabled: true

# ==================== 预警引擎配置 ====================
alert_engine:
  scan_intervals:
    vital_signs: 60
    lab_results: 300
    sepsis: 300
    ards: 300
    aki: 600
    dic: 900
    tbi: 300
    bleeding: 600
    ventilator: 3600
    drug_safety: 1800
    antibiotic_stewardship: 1800
    delirium_risk: 900
    fluid_balance: 600
    glycemic_control: 300
    vte_prophylaxis: 900
    nutrition_monitor: 900
    composite_deterioration: 300
    assessments: 600
    trend_analysis: 900

  severity_levels:
    warning:  { color: "#ffab00", priority: 1 }
    high:     { color: "#ff5252", priority: 2 }
    critical: { color: "#d500f9", priority: 3 }

  suppression:
    same_rule_same_patient_seconds: 1800
    max_alerts_per_patient_per_hour: 10

  data_mapping:
    urine_output:
      codes: ["param_urine", "param_尿量", "urine_output", "urine_ml_h", "param_udd_urine_total"]
    fluid_output:
      drainage_codes: ["param_drainage", "param_引流量", "drainage_output"]
      ultrafiltration_codes: ["param_uf", "param_超滤量", "ultrafiltration_output"]
      gi_decompression_codes: ["param_gi_decompression", "param_胃肠减压", "gi_decompression_output"]
    glucose:
      codes: ["param_blood_glucose", "param_glu", "param_血糖", "blood_glucose"]
    qtc_codes: ["param_qtc", "param_QTc", "ecg_qtc", "qtc"]
    icp_codes: ["param_ICP", "param_icp"]
    cpp_codes: ["param_CPP", "param_cpp"]

  vital_signs_advanced:
    af_hr_threshold: 100
    af_irregular_duration_seconds: 300
    af_max_gap_seconds: 120
    af_new_onset_lookback_hours: 6
    af_rhythm_lookback_minutes: 30
    af_keywords: ["房颤", "AF", "atrial fibrillation"]
    afl_keywords: ["房扑", "AFL", "atrial flutter"]
    irregular_keywords: ["不规则", "irregular", "arrhythmia", "房颤", "房扑"]
    rhythm_codes: ["param_xinLvLv", "rhythm_type", "param_rhythm_type", "arrhythmia_flag", "param_arrhythmia_flag"]
    arrhythmia_flag_codes: ["arrhythmia_flag", "param_arrhythmia_flag"]
    brady_hr_threshold: 50
    brady_sbp_drop_threshold: 20
    brady_sbp_window_minutes: 30
    qtc_threshold_ms: 500
    qtc_critical_ms: 550
    qtc_lookback_hours: 2

  composite_deterioration:
    window_hours: 4
    organ_threshold: 3
    min_alert_count: 3
    max_source_alerts: 300
    ignore_categories: ["assessments", "ai_analysis", "composite_deterioration"]
    ignore_alert_types: ["nurse_reminder", "multi_organ_deterioration_trend"]
    organ_mapping:
      respiratory:
        alert_types: ["ards", "weaning", "opioid_respiratory_depression"]
        categories: ["ventilator"]
        parameters: ["param_resp", "param_spo2", "pao2", "oxygen", "fio2", "peep"]
        keywords: ["呼吸", "氧", "spo2", "p/f", "呼吸机", "resp"]
      circulatory:
        alert_types: ["septic_shock", "qsofa", "sofa", "brady_hypotension", "af_afl_new_onset"]
        categories: ["vital_signs"]
        parameters: ["param_ibp_m", "param_nibp_m", "param_ibp_s", "param_nibp_s", "map", "sbp", "hr", "shock"]
        keywords: ["循环", "休克", "低血压", "心动过缓", "房颤", "房扑", "map", "sbp"]
      renal:
        alert_types: ["aki", "nephrotoxicity", "fluid_balance"]
        categories: []
        parameters: ["cr", "creatinine", "urine", "尿", "renal"]
        keywords: ["肾", "肌酐", "尿量", "液体平衡", "renal", "aki"]
      coagulation:
        alert_types: ["dic", "hit", "gi_bleeding"]
        categories: []
        parameters: ["plt", "inr", "pt", "fib", "ddimer", "coag"]
        keywords: ["凝血", "血小板", "d-dimer", "出血", "coag"]
      hepatic:
        alert_types: []
        categories: []
        parameters: ["bil", "bilirubin", "tbil", "liver", "hepatic"]
        keywords: ["肝", "胆红素", "liver", "hepatic"]
      neurologic:
        alert_types: ["pupil", "tbi", "icp", "cpp", "gcs_drop", "delirium_risk", "sedation_delirium_conversion"]
        categories: ["tbi"]
        parameters: ["gcs", "rass", "icp", "cpp", "pupil", "neuro"]
        keywords: ["神经", "意识", "谵妄", "瞳孔", "颅脑", "neuro", "gcs", "rass"]

  fluid_balance:
    windows_hours: [6, 12, 24]
    positive_balance_warning_pct: 5
    positive_balance_critical_pct: 10
    rapid_infusion_ml_per_kg_6h: 30
    urine_response_ml_per_kg_h: 0.5
    linkage_lookback_hours: 24

  delirium_risk:
    warning_score: 4
    high_score: 7
    critical_score: 10
    benzodiazepine_keywords: ["咪达唑仑", "地西泮", "劳拉西泮", "阿普唑仑", "艾司唑仑", "氯硝西泮"]
    morphine_keywords: ["吗啡", "morphine"]
    factor_weights:
      age_gt_65: 1
      benzodiazepine: 2
      emergency_admission: 1
      mechanical_ventilation: 2
      metabolic_acidosis: 2
      morphine_use: 1
      bun_elevated: 2
      deep_sedation: 1
      gcs_low: 1

  glycemic_control:
    cv_warning_pct: 36
    low_warning_mmol: 3.9
    low_critical_mmol: 2.2
    drop_rate_warning_mmol_per_h: 3
    insulin_recheck_hours: 2
    high_threshold_mmol: 10
    high_consecutive_count: 3
    insulin_lookback_hours: 12
    min_points_for_cv: 4
    insulin_keywords: ["胰岛素", "insulin", "门冬胰岛素", "甘精胰岛素", "赖脯胰岛素", "地特胰岛素"]
    pump_keywords: ["泵", "微泵", "泵入", "泵注", "insulin pump", "pump"]

  antibiotic_stewardship:
    empiric_timeout_hours: 48
    pct_stop_eval_days: 5
    vanco_tdm_days: 3
    duration_limit_days: 7
    antibiotic_type_keywords: ["抗生素", "抗菌", "抗感染", "antibiotic", "antimicrobial"]
    broad_type_keywords: ["广谱", "碳青霉烯", "三四代头孢", "broad", "carbapenem"]
    antibiotic_keywords: ["头孢", "青霉素", "美罗培南", "左氧氟沙星", "万古霉素", "阿奇霉素", "哌拉西林"]
    broad_spectrum_keywords: ["美罗培南", "亚胺培南", "哌拉西林他唑巴坦", "头孢哌酮舒巴坦", "头孢吡肟", "替加环素"]
    culture_keywords: ["培养", "culture", "药敏", "细菌", "真菌"]
    culture_pending_keywords: ["待报", "待回", "进行中", "pending", "未出"]
    culture_positive_keywords: ["阳性", "positive", "生长", "检出", "分离出"]
    vancomycin_keywords: ["万古霉素", "vancomycin"]
    aminoglycoside_keywords: ["阿米卡星", "庆大霉素", "妥布霉素", "依替米星", "奈替米星", "链霉素"]
    vanco_tdm_keywords: ["万古霉素谷", "万古霉素浓度", "万古霉素血药浓度", "vancomycin trough"]
    aminoglycoside_tdm_keywords: ["阿米卡星谷", "庆大霉素谷", "妥布霉素谷", "氨基糖苷", "amikacin trough", "gentamicin trough"]

  vte_prophylaxis:
    padua_high_risk_score: 4
    caprini_high_risk_score: 5
    immobility_hours_threshold: 48
    prophylaxis_lookback_hours: 72
    pharm_prophylaxis_keywords: ["依诺肝素", "那曲肝素", "达肝素", "低分子肝素", "普通肝素", "肝素", "fondaparinux", "利伐沙班"]
    mechanical_prophylaxis_keywords: ["间歇充气", "IPC", "SCD", "气压治疗", "弹力袜", "机械预防", "下肢气压泵", "梯度压力袜"]
    mechanical_negative_keywords: ["未做", "未行", "未实施", "none", "no", "否"]
    active_bleeding_alert_types: ["gi_bleeding"]
    immobility_keywords: ["卧床", "制动", "绝对卧床", "不能下床", "bed rest", "immobile", "瘫痪", "昏迷"]
    mobility_positive_keywords: ["下床", "活动", "行走", "可活动", "ambulation", "walking"]
    cancer_keywords: ["恶性肿瘤", "癌", "cancer", "肿瘤"]
    previous_vte_keywords: ["静脉血栓", "肺栓塞", "DVT", "PE", "VTE"]
    thrombophilia_keywords: ["易栓症", "抗磷脂", "thrombophilia"]
    heart_resp_failure_keywords: ["心衰", "呼衰", "heart failure", "respiratory failure"]
    acute_mi_stroke_keywords: ["急性心梗", "脑卒中", "stroke", "MI"]
    infection_rheum_keywords: ["感染", "sepsis", "肺炎", "风湿", "rheum"]
    recent_surgery_keywords: ["术后", "手术", "surgery", "trauma", "外伤", "骨折手术"]
    hormonal_treatment_keywords: ["雌激素", "孕激素", "激素替代", "tamoxifen", "他莫昔芬"]
    padua_weights:
      active_cancer: 3
      previous_vte: 3
      reduced_mobility: 3
      thrombophilia: 3
      recent_trauma_surgery: 2
      age_ge_70: 1
      heart_or_resp_failure: 1
      acute_mi_or_stroke: 1
      acute_infection_or_rheum: 1
      obesity_bmi_ge_30: 1
      hormonal_treatment: 1
    caprini_weights:
      age_41_60: 1
      age_61_74: 2
      age_ge_75: 3
      bmi_gt_25: 1
      bedrest_gt_72h: 1
      recent_surgery: 2
      active_cancer: 2
      previous_vte: 3
      thrombophilia: 3
      acute_stroke_or_mi: 5

  nutrition_monitor:
    start_delay_hours: 48
    calorie_target_kcal_per_kg_day: 25
    calorie_coverage_threshold: 0.6
    calorie_under_target_persist_hours: 72
    feeding_intolerance_lookback_hours: 72
    grv_threshold_ml: 500
    refeeding_monitor_hours: 72
    malnutrition_bmi_threshold: 18.5
    malnutrition_albumin_g_l_threshold: 25
    albumin_baseline_lookback_days: 7
    electrolyte_drop_ratio_threshold: 0.2
    electrolyte_drop_abs_threshold:
      k: 0.5
      phosphate: 0.3
      magnesium: 0.2
    electrolyte_low_threshold:
      k: 3.5
      phosphate: 0.8
      magnesium: 0.75
    default_enteral_kcal_per_ml: 1.0
    default_parenteral_kcal_per_ml: 0.8
