# ============================================================
# ICU智能预警系统 - 主配置文件
# ============================================================

system:
  name: "ICU智能预警系统"
  version: "1.0.0"
  timezone: "Asia/Shanghai"
  log_level: "INFO"
  log_dir: "./logs"

security:
  cors_allowed_origins:
    - "http://127.0.0.1:5173"
    - "http://localhost:5173"
    - "http://127.0.0.1:4173"
    - "http://localhost:4173"
  websocket:
    require_token: auto
    tokens: []
    ws_token_secret: "替换为随机密钥"
    ws_token_algorithm: "HS256"

# ==================== 数据库配置 ====================
databases:
  smartcare:
    database: "SmartCare"
    # 已有Collection
    collections:
      patient: "patient"
      bedside: "bedside"
      device_cap: "deviceCap"
      device_online: "deviceOnline"
      device_bind: "deviceBind"
      drug_exe: "drugExe"
      config_param: "configParam"
      config_drug: "configDrug"
    # 预警系统新建Collection
    alert_collections:
      alert_records: "alert_records"
      alert_rules: "alert_rules"
      field_mapping: "field_mapping"
      score_records: "score_records"
      nurse_reminders: "nurse_reminders"
      audit_log: "audit_log"

  datacenter:
    database: "DataCenter"
    collections:
      exam: "VI_ICU_EXAM"
      exam_item: "VI_ICU_EXAM_ITEM"
      report: "VI_ICU_report"

# ==================== 数据关联 ====================
data_linking:
  # SmartCare库内关联: patient._id ←→ bedside.pid / drugExe.pid / deviceBind.pid
  # 跨库关联: patient.hisPid ←→ VI_ICU_EXAM.hisPid / VI_ICU_EXAM_ITEM.hisPid
  # 设备关联: deviceCap.deviceID → deviceBind.deviceID(unBindTime=null) → deviceBind.pid → patient._id
  cross_db_patient_key:
    smartcare: "_id"
    datacenter: "hisPid"
  device_to_patient:
    method: "device_bind"
    bind_collection: "deviceBind"
    active_condition: "unBindTime == null"

# ==================== 监护仪参数映射 ====================
vital_signs:
  temperature:    { code: "param_T",         name: "体温",      unit: "℃" }
  heart_rate:     { code: "param_HR",        name: "心率",      unit: "bpm" }
  resp_rate:      { code: "param_resp",      name: "呼吸频率",  unit: "次/分" }
  spo2:           { code: "param_spo2",      name: "血氧饱和度", unit: "%" }
  pulse_rate:     { code: "param_PR",        name: "脉率",      unit: "bpm" }
  rhythm:         { code: "param_xinLvLv",   name: "心律",      unit: "" }
  cvp:            { code: "param_cvp",       name: "中心静脉压", unit: "cmH2O" }
  etco2:          { code: "param_ETCO2",     name: "呼气末CO2", unit: "mmHg" }
  # 血压 - 有创（优先）
  ibp_systolic:   { code: "param_ibp_s",     name: "有创收缩压", unit: "mmHg" }
  ibp_diastolic:  { code: "param_ibp_d",     name: "有创舒张压", unit: "mmHg" }
  ibp_mean:       { code: "param_ibp_m",     name: "有创平均压", unit: "mmHg" }
  # 血压 - 无创
  nibp_systolic:  { code: "param_nibp_s",    name: "无创收缩压", unit: "mmHg" }
  nibp_diastolic: { code: "param_nibp_d",    name: "无创舒张压", unit: "mmHg" }
  nibp_mean:      { code: "param_nibp_m",    name: "无创平均压", unit: "mmHg" }

  # 取值优先级: 有创 > 无创
  map_priority: ["param_ibp_m", "param_nibp_m"]
  sbp_priority: ["param_ibp_s", "param_nibp_s"]
  dbp_priority: ["param_ibp_d", "param_nibp_d"]

# ==================== 呼吸机参数映射 ====================
ventilator:
  # 设置参数
  vent_mode:      { code: "param_HuXiMoShi",           name: "呼吸模式" }
  fio2:           { code: "param_FiO2",                 name: "FiO2",           unit: "%" }
  vt_set:         { code: "param_vent_set_vt",          name: "设置潮气量",     unit: "ml" }
  peep_set:       { code: "param_vent_peep",            name: "PEEP(设置)",     unit: "cmH2O" }
  ps_set:         { code: "param_vent_ps",              name: "PS(设置)",       unit: "cmH2O" }
  ipap:           { code: "param_vent_pc",              name: "IPAP",           unit: "cmH2O" }
  rr_set:         { code: "param_HuXiPinLv",            name: "设置频率",       unit: "次/分" }
  # 实测参数
  minute_vent:    { code: "param_vent_VE",              name: "分钟通气量",     unit: "L/min" }
  rr_measured:    { code: "param_vent_resp",             name: "实测呼吸率",     unit: "次/分" }
  vte:            { code: "param_vent_vt",               name: "呼出潮气量",     unit: "ml" }
  peep_measured:  { code: "param_vent_measure_peep",     name: "PEEP(实测)",     unit: "cmH2O" }
  pip:            { code: "param_vent_pip",              name: "气道峰压",       unit: "cmH2O" }
  pplat:          { code: "param_vent_plat_pressure",    name: "平台压",         unit: "cmH2O" }
  pmean:          { code: "param_vent_measure_Pmean",    name: "平均气道压",     unit: "cmH2O" }
  compliance:     { code: "param_vent_compliance",       name: "呼吸顺应性",     unit: "ml/cmH2O" }
  c_stat:         { code: "param_vent_C_STAT",           name: "静态顺应性",     unit: "ml/cmH2O" }

# ==================== 评分参数映射 ====================
assessments:
  gcs:            { code: "param_score_gcs_obs",    name: "GCS评分",     range: [3, 15] }
  rass:           { code: "param_score_rass_obs",   name: "RASS评分",    range: [-5, 4] }
  pain:           { code: "param_tengTong_score",   name: "疼痛评分",    range: [0, 10] }
  cpot:           { code: "param_score_cpot",       name: "CPOT评分",    range: [0, 8] }
  bps:            { code: "param_score_bps",        name: "BPS评分",     range: [3, 12] }
  delirium:       { code: "param_delirium_score",   name: "谵妄评分" }
  consciousness:  { code: "param_Yishi",            name: "意识" }
  braden:         { code: "param_score_braden",     name: "Braden评分",  range: [0, 23] }
  pupil_left:     { code: "param_左瞳孔/光反射",    name: "左瞳孔" }
  pupil_right:    { code: "param_右瞳孔/光反射",    name: "右瞳孔" }

# ==================== AI配置 ====================
ai_service:
  max_patients: 30
  suppression_seconds: 3600
  llm:
    timeout: 60
    max_concurrency: 4
    cache_ttl_seconds: 1800
    temperature: 0.1
    max_tokens: 4096
    circuit_breaker:
      failure_threshold: 3
      cooldown_seconds: 180

  temporal_model:
    backend: auto
    model_path: ""
    history_offsets_hours: [-8, -6, -4, -2, 0]
    candidate_names:
      - temporal_risk.onnx
      - temporal_risk.pt
      - temporal_risk.pth
      - temporal_risk_model.onnx
      - temporal_risk_model.pt

  task_routing:
    lab_item_mapping:
      temperature: 0.0
    rule_generation:
      temperature: 0.2

  lab_mapping:
    auto_init_on_startup: false
    confidence_threshold: 0.8
    batch_size: 50

  rag:
    enabled: true
    provider: "local"
    knowledge_dir: "knowledge_base"
    top_k: 4
    backend: "tfidf"                      # "tfidf" | "embedding"
    embedding_model: "BAAI/bge-small-zh-v1.5"

  clinical_reasoning:
    enabled: true
    rag_top_k: 6
    persist_window_minutes: 60
    reference_types: ["guideline", "consensus", "meta-analysis"]

  document_generation:
    enabled: true
    default_hours: 24
    rag_top_k: 5
    persist_window_minutes: 30
    temperature: 0.1
    timeout: 60
    max_tokens: 3200

  knowledge_graph:
    enabled: true
    persist_window_minutes: 60

  multi_agent:
    enabled: true
    persist_window_minutes: 60

extended_scenarios:
  post_cardiac_surgery:
    - tamponade_risk
    - sternal_wound_infection
    - post_pump_syndrome
  post_neurosurgery:
    - cerebral_vasospasm
    - hydrocephalus_acute
    - seizure_prophylaxis
  post_liver_transplant:
    - primary_graft_nonfunction
    - hepatic_artery_thrombosis
  rare_critical:
    - malignant_hyperthermia
    - transfusion_reaction
    - adrenal_crisis
    - thyroid_storm
    - fat_embolism_syndrome
    - refeeding_syndrome
    - tumor_lysis_syndrome
    - heparin_induced_thrombocytopenia
  drug_interactions:
    - serotonin_syndrome
    - neuroleptic_malignant_syndrome
    - propofol_infusion_syndrome
    - contrast_nephropathy_risk
  device_complications:
    - ventilator_auto_peep
    - iabp_timing_mismatch
    - ecmo_circuit_thrombosis
    - pacemaker_failure_to_capture
    - crrt_filter_clotting
    - central_line_dislodgement_risk
    - arterial_line_failure
    - tracheostomy_obstruction
    - urinary_catheter_obstruction
  hemodynamic_instability:
    - septic_shock_escalation
    - septic_shock_refractory
    - hemorrhagic_shock
    - cardiogenic_shock
    - obstructive_shock_pe
    - vasoplegia_refractory
    - hypertensive_emergency
  respiratory_failure:
    - refractory_hypoxemia
    - hypercapnic_failure
    - pneumothorax_risk
    - aspiration_pneumonia
    - mucus_plugging
    - ventilator_asynchrony
    - extubation_failure_risk
    - pulmonary_edema
  renal_metabolic:
    - aki_progression
    - hyperkalemia_critical
    - severe_hyponatremia
    - severe_hypernatremia
    - metabolic_acidosis
    - lactic_acidosis_persistent
    - uremic_complication
    - rhabdomyolysis
  infection_sepsis:
    - sepsis_escalation
    - invasive_fungal_risk
    - catheter_bloodstream_infection
    - ventilator_associated_pneumonia
    - c_difficile_risk
    - neutropenic_sepsis_risk
  neuro_critical:
    - delirium_hyperactive
    - delirium_hypoactive
    - status_epilepticus_risk
    - elevated_icp_risk
    - acute_stroke_evolution
  hematology_transfusion:
    - dic_progression
    - active_bleeding_risk
    - coagulopathy_severe
    - thrombocytopenia_severe
    - anemia_transfusion_trigger
  nutrition_endocrine:
    - hypoglycemia_critical
    - hyperglycemia_crisis
    - starvation_ketosis_risk
    - adrenal_insufficiency_risk
  postoperative_general:
    - anastomotic_leak_risk
    - postop_bleeding_recurrence
    - ileus_risk
    - abdominal_compartment_risk

  monitor:
    enabled: true
    aggregate_interval_seconds: 300
    success_rate_alert_threshold: 0.9
    p95_latency_alert_ms: 15000
    min_samples_for_alert: 5

# ==================== 预警引擎配置 ====================
alert_engine:
  max_concurrent_scans: 4
  execution_mode: inline  # inline | redis_queue
  task_queue:
    mode: redis_queue
    redis_queue_name: icu:alert_engine:scan_queue
    redis_pubsub_channel: icu:alerts:broadcast
    dedupe_ttl_seconds: 900
    worker_concurrency: 4
    worker_poll_timeout: 5
    dispatcher_enabled: true
  scan_intervals:
    vital_signs: 60
    lab_results: 300
    sepsis: 300
    ards: 300
    aki: 600
    dic: 900
    tbi: 300
    bleeding: 600
    temporal_risk_scanner: 900
    ventilator: 600
    diaphragm_protection: 900
    drug_safety: 1800
    antibiotic_stewardship: 1800
    arc_risk: 300
    antimicrobial_pk: 600
    vanco_tdm_closed_loop: 600
    immunocompromised_monitor: 600
    delirium_risk: 900
    circadian_protector: 900
    fluid_balance: 600
    hai_bundle: 1800
    glycemic_control: 300
    vte_prophylaxis: 900
    nutrition_monitor: 900
    composite_deterioration: 300
    cardiac_arrest: 120
    microbiology: 1800
    right_heart_monitor: 600
    pe_detection: 600
    palliative_trigger: 1800
    postop_monitor: 1800
    ecash_bundle: 600
    icu_aw_mobility: 900
    assessments: 600
    trend_analysis: 900
    alert_reasoning: 300
    imaging_report_analyzer: 7200
    nursing_note_analyzer: 14400
    nursing_workload: 14400
    adaptive_threshold_advisor: 7200
    discharge_readiness: 1800
    proactive_management: 300
    extended_scenarios: 1800

  severity_levels:
    warning:  { color: "#ffab00", priority: 1 }
    high:     { color: "#ff5252", priority: 2 }
    critical: { color: "#d500f9", priority: 3 }

  suppression:
    same_rule_same_patient_seconds: 1800
    max_alerts_per_patient_per_hour: 10

  patient_baseline:
    enabled: true
    hours: 12
    min_points: 3
    zscore_tolerance: 2.0
    relative_tolerance: 0.08
    absolute_floor: 2.0

  alert_reasoning_agent:
    enabled: true
    trigger_window_minutes: 30
    min_active_alerts: 3
    recent_context_hours: 24
    cache_ttl_seconds: 900
    max_concurrency: 2

  imaging_report_analyzer:
    analysis_window_hours: 96


  antimicrobial_pk:
    arc:
      age_lt: 50
      crcl_threshold: 130
      creatinine_lt_umol_l: 60
      urine_ml_h_gt: 100
      trauma_neuro_keywords: ["外伤", "创伤", "脑外伤", "tbi", "sah", "神经外科", "颅脑", "神外"]

    pop_pk:
      vancomycin:
        # PopPK参数来源：Roberts et al., Antimicrob Agents Chemother, 2011。
        # 这里将 ICU 人群模型工程化简化为一室近似，70kg 基准下取 CL≈4.5 L/h, Vd≈45 L。
        keywords: ["万古霉素", "vancomycin"]
        base_cl_l_h: 4.5
        base_vd_l: 45
        tau_h: 12
        mic: 1
        auc_mic_target_low: 400
        auc_mic_target_high: 600
        crcl_ref: 100
        weight_ref: 70
        arc_cl_multiplier_high: 1.25
        arc_cl_multiplier_moderate: 1.1
        # 当前版本尚未读取 CRRT effluent_rate 定量计算 CL_crrt，这里仅作保守简化乘数。
        crrt_cl_multiplier: 0.85
        low_albumin_vd_multiplier: 1.15
      meropenem:
        # PopPK参数参考 ICU 人群文献并工程化简化为一室近似，用于实时预警而非替代正式TDM建模。
        keywords: ["美罗培南", "meropenem"]
        base_cl_l_h: 10
        base_vd_l: 25
        tau_h: 8
        mic: 2
        ft_mic_target: 0.5
        crcl_ref: 100
        weight_ref: 70
        arc_cl_multiplier_high: 1.3
        arc_cl_multiplier_moderate: 1.15
        # 当前版本尚未读取 CRRT effluent_rate 定量计算 CL_crrt，这里仅作保守简化乘数。
        crrt_cl_multiplier: 0.9
        low_albumin_vd_multiplier: 1.1
      piperacillin_tazobactam:
        # PopPK参数参考 ICU 人群文献并工程化简化为一室近似，用于实时预警而非替代正式TDM建模。
        keywords: ["哌拉西林他唑巴坦", "哌拉西林", "他唑巴坦", "piperacillin", "tazobactam", "特治星", "他唑仙"]
        base_cl_l_h: 12
        base_vd_l: 28
        tau_h: 8
        mic: 16
        ft_mic_target: 0.5
        crcl_ref: 100
        weight_ref: 70
        arc_cl_multiplier_high: 1.3
        arc_cl_multiplier_moderate: 1.15
        # 当前版本尚未读取 CRRT effluent_rate 定量计算 CL_crrt，这里仅作保守简化乘数。
        crrt_cl_multiplier: 0.9
        low_albumin_vd_multiplier: 1.1

    tdm:
      vanco_keywords: ["万古霉素", "vancomycin", "vanco", "万古谷浓度"]
      vanco_mic: 1
      auc_mic_target_low: 400
      auc_mic_target_high: 600
      omega_cl_sq: 0.15
      sigma_sq: 0.04

  alert_intelligence:
    enabled: true
    fusion_window_minutes: 15
    procedure_suppression_minutes: 10
    nursing_plan_coverage_enabled: true
    nursing_plan_lookback_hours: 12
    nursing_plan_execution_window_minutes: 120
    suppress_warning_when_plan_active: true
    post_execution_recurrence_window_minutes: 180
    post_execution_recurrence_threshold: 2
    suction_keywords: ["吸痰", "拍背", "翻身拍背", "气道护理", "痰液吸引"]

  alert_actionability:
    enabled: true
    history_lookback_days: 30
    min_history_samples: 8
    action_match_hours: 24
    recent_response_window_minutes: 60

  adaptive_threshold_advisor:
    enabled: true
    scan_interval_seconds: 7200
    stats_lookback_hours: 48
    min_data_points: 20
    llm_temperature: 0.1
    llm_max_tokens: 2048
    llm_timeout: 45
    max_concurrent: 3
    cache_ttl_seconds: 3600
    max_population_relative_drift: 0.2
    max_population_absolute_drift:
      map: 10
      hr: 20
      spo2: 4
      sbp: 20
      rr: 8
      temperature: 1.0
    reissue_mean_shift_sd: 1.0
    reissue_latest_shift_sd: 0.8
    reissue_min_abs_delta:
      map: 5
      hr: 8
      spo2: 2
      sbp: 8
      rr: 3
      temperature: 0.4
    vasopressor_keywords:
      - "去甲肾上腺素"
      - "多巴胺"
      - "多巴酚丁胺"
      - "肾上腺素"
      - "血管加压素"
      - "垂体后叶素"
      - "米力农"
      - "norepinephrine"
      - "dopamine"
      - "dobutamine"
      - "epinephrine"
      - "vasopressin"
      - "milrinone"
      - "phenylephrine"
      - "去氧肾上腺素"
    sedation_keywords:
      - "丙泊酚"
      - "咪达唑仑"
      - "右美托咪定"
      - "propofol"
      - "midazolam"
      - "dexmedetomidine"
      - "芬太尼"
      - "瑞芬太尼"
      - "舒芬太尼"
      - "fentanyl"
      - "remifentanil"
      - "sufentanil"
      - "吗啡"
      - "morphine"
    bounds:
      map: { low_min: 40, low_max: 85, high_min: 90, high_max: 150 }
      hr: { low_min: 30, low_max: 70, high_min: 90, high_max: 180 }
      spo2: { low_min: 75, low_max: 96 }
      sbp: { low_min: 50, low_max: 120, high_min: 140, high_max: 230 }
      rr: { low_min: 4, low_max: 16, high_min: 22, high_max: 50 }
      temperature: { low_min: 32.0, low_max: 36.5, high_min: 37.5, high_max: 41.0 }

  temporal_risk_scanner:
    lookback_hours: 12
    grid_minutes: 5
    horizons_hours: [4, 12, 24]
    organ_keys: ["respiratory", "circulatory", "renal", "neurologic"]
    population_medians:
      hr: 88
      map: 75
      spo2: 97
      rr: 19
      temp: 36.8
      lactate: 1.6
      sofa: 5

  hai_bundle:
    cvc_review_days: 7
    foley_hours_threshold: 48
    fever_threshold: 38.0
    cvc_keywords: ["中心静脉", "cvc", "picc", "深静脉"]
    foley_keywords: ["导尿", "foley", "尿管", "导尿管"]
    vent_keywords: ["气管插管", "ett", "endotracheal", "机械通气"]
    blood_culture_keywords: ["血培养", "blood culture"]
    hob_keywords: ["床头抬高", "抬高床头", "半卧位", "30°", "45°"]
    oral_care_keywords: ["口腔护理", "口护", "口腔清洁"]

  immunocompromised_monitor:
    drug_lookback_hours: 336
    neutropenia_threshold: 0.5
    fever_threshold_c: 38.0
    map_threshold: 65
    sbp_threshold: 90
    tachy_threshold: 110
    immunosuppressive_keywords: ["环孢素", "他克莫司", "吗替麦考酚酯", "化疗", "环磷酰胺", "甲氨蝶呤", "移植", "激素", "泼尼松", "地塞米松"]
    anc_keywords: ["anc", "中性粒细胞绝对值", "中性粒细胞#", "neut#"]
    lymphocyte_keywords: ["淋巴细胞绝对值", "lymphocyte", "lymph#"]

  circadian_protector:
    enabled: true
    night_start_hour: 22
    night_end_hour: 6
    night_operation_threshold: 6
    night_rass_fluctuation_threshold: 2
    night_warning_summary_threshold: 4

  diaphragm_protection:
    min_ventilation_days: 0.5
    edi_low_threshold: 5
    edi_high_threshold: 15
    pdi_low_threshold: 3
    pdi_high_threshold: 12
    p0_1_high_threshold: 3.5
    rr_high_threshold: 30
    deep_sedation_rass_threshold: -3
    driving_pressure_warning: 15
    pressure_swing_warning: 15

  palliative_trigger:
    icu_days_threshold: 14
    burden_days: 3
    gcs_threshold: 8
    age_threshold: 80
    comorbidity_threshold: 3
    score_threshold: 5

  data_quality_filter:
    lead_off_spo2_threshold: 90
    temp_min_c: 30
    temp_max_c: 43
    nibp_delta_threshold: 40

  data_mapping:
    urine_output:
      codes: ["param_urine", "param_尿量", "urine_output", "urine_ml_h", "param_udd_urine_total"]
    fluid_output:
      drainage_codes: ["param_drainage", "param_引流量", "drainage_output"]
      ultrafiltration_codes: ["param_uf", "param_超滤量", "ultrafiltration_output"]
      gi_decompression_codes: ["param_gi_decompression", "param_胃肠减压", "gi_decompression_output"]
    glucose:
      codes: ["param_blood_glucose", "param_glu", "param_血糖", "blood_glucose"]
    qtc_codes: ["param_qtc", "param_QTc", "ecg_qtc", "qtc"]
    icp_codes: ["param_ICP", "param_icp"]
    cpp_codes: ["param_CPP", "param_cpp"]

  vital_signs_advanced:
    af_hr_threshold: 100
    af_irregular_duration_seconds: 300
    af_max_gap_seconds: 120
