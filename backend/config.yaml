      脓毒症: ["sepsis", "感染性休克", "脓毒性休克"]
      感染性休克: ["septic shock", "脓毒症", "脓毒性休克"]
      急性呼吸窘迫综合征: ["ards", "急性肺损伤"]
      谵妄: ["delirium", "cam-icu", "cam icu"]
      急性肾损伤: ["aki", "acute kidney injury"]

# ==================== 护理提醒 ====================
nurse_reminders:
  gcs:       { code: "param_score_gcs_obs",   interval_hours: 4 }
  rass:      { code: "param_score_rass_obs",   interval_hours: 4 }
  pain:      { code: "param_tengTong_score",   interval_hours: 4 }
  cpot:
    code: "param_score_cpot"
    interval_hours: 4
    name: "CPOT评估超时"
    analgesic_adjustment_enabled: true
    adjustment_lookback_hours: 8
    assessment_before_hours: 1
    assessment_after_hours: 1
    dose_change_ratio_threshold: 0.25
    adjustment_name: "CPOT评估(镇痛药调整前后)"
  bps:
    code: "param_score_bps"
    interval_hours: 4
    name: "BPS评估超时"
    analgesic_adjustment_enabled: true
    adjustment_lookback_hours: 8
    assessment_before_hours: 1
    assessment_after_hours: 1
    dose_change_ratio_threshold: 0.25
    adjustment_name: "BPS评估(镇痛药调整前后)"
  delirium:  { code: "param_delirium_score",   interval_hours: 12, severity: "critical", name: "谵妄评估超时" }
  braden:    { code: "param_score_braden",     interval_hours: 24, name: "BRADEN压疮风险评估超时" }
  cam_icu:   { code: "param_delirium_score", rass_gte: -3, interval_hours: 8, severity: "critical", name: "CAM-ICU评估超时" }
  turning:
    code: "nurse_turning"
    interval_hours: 2
    very_high_risk_interval_hours: 1.5
    braden_high_risk_threshold: 12
    deep_sedation_rass_threshold: -2
    bmi_low_threshold: 18.5
    bmi_high_threshold: 30
    turning_event_lookback_hours: 96
    turning_keywords: ["翻身", "体位变换", "更换体位", "reposition", "turn", "侧卧", "俯卧位", "半卧位", "卧位调整"]
  early_mobility:
    code: "nurse_early_mobility"
    interval_hours: 8
    icu_hours_threshold: 48
    inactivity_hours: 24
    map_threshold: 60
    norepi_threshold_ug_kg_min: 0.2
    norepi_lookback_hours: 12
    norepi_taper_min_drop_ratio: 0.1
    fio2_threshold: 0.6
    peep_threshold: 10
    rass_min: -1
    rass_max: 1
    activity_keywords: ["活动", "下床", "坐起", "坐位", "站立", "行走", "床边活动", "早期活动", "康复训练", "转移到椅", "步行"]
    norepi_keywords: ["去甲肾上腺素", "norepinephrine", "noradrenaline", "去甲"]
    name: "建议评估早期活动"
    rule_id: "NURSE_EARLY_MOBILITY"

# ==================== 通知（纯内网）====================
notification:
  websocket:
    enabled: true
  screen_alert:
    enabled: true
    critical_flash: true
    sound_enabled: true

# ==================== UI ====================
ui:
  theme: "dark"
  refresh_interval_seconds: 10
